<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Moderno</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body{
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      min-height:100vh;
      padding:40px;
      color:white;
    }

    .container{
      max-width:950px;
      margin:auto;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius:20px;
      padding:30px;
      box-shadow:0 8px 30px rgba(0,0,0,0.3);
    }

    h1{
      text-align:center;
      margin-bottom:25px;
      font-size:42px;
      color:#fff;
      text-shadow:2px 2px 10px rgba(0,0,0,0.3);
    }

    .subtitulo{
      text-align:center;
      margin-bottom:30px;
      color:#dfe9ff;
      font-size:18px;
    }

    /* BLOG */

    .blog-area textarea{
      width:100%;
      height:220px;
      border:none;
      border-radius:15px;
      padding:20px;
      font-size:17px;
      resize:none;
      outline:none;
      background:white;
      color:#333;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    /* IMAGENES */

    .imagenes{
      margin-top:25px;
      display:flex;
      gap:15px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .imagenes input{
      background:white;
      padding:10px;
      border-radius:10px;
      cursor:pointer;
      color:black;
    }

    .preview{
      margin-top:25px;
      display:flex;
      gap:20px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .preview img{
      width:260px;
      height:180px;
      object-fit:cover;
      border-radius:15px;
      border:4px solid white;
      transition:0.4s;
      box-shadow:0 5px 15px rgba(0,0,0,0.3);
    }

    .preview img:hover{
      transform:scale(1.05);
    }

    /* COMENTARIOS */

    .comentarios{
      margin-top:40px;
    }

    .comentarios h2{
      margin-bottom:15px;
      font-size:30px;
      color:#fff;
    }

    .comentarios textarea{
      width:100%;
      height:120px;
      border:none;
      border-radius:15px;
      padding:15px;
      resize:none;
      outline:none;
      font-size:16px;
      color:#333;
    }

    button{
      margin-top:15px;
      background: linear-gradient(45deg,#ff416c,#ff4b2b);
      border:none;
      padding:14px 25px;
      border-radius:12px;
      color:white;
      font-size:17px;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    button:hover{
      transform:translateY(-3px);
      background: linear-gradient(45deg,#ff4b2b,#ff416c);
    }

    .lista-comentarios{
      margin-top:25px;
    }

    .comentario{
      background:white;
      color:#333;
      padding:15px;
      border-radius:12px;
      margin-bottom:15px;
      animation:aparecer 0.5s ease;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    @keyframes aparecer{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    footer{
      text-align:center;
      margin-top:30px;
      color:#d9e4ff;
      font-size:14px;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>✨ Mi Blog Moderno ✨</h1>

    <p class="subtitulo">
      Comparte tus ideas, imágenes y recibe comentarios.
    </p>

    <!-- BLOG -->
    <div class="blog-area">
      <textarea placeholder="Escribe tu blog aquí..."></textarea>
    </div>

    <!-- SUBIR IMAGENES -->
    <div class="imagenes">
      <input type="file" accept="image/*" onchange="mostrarImagen(event,0)">
      <input type="file" accept="image/*" onchange="mostrarImagen(event,1)">
      <input type="file" accept="image/*" onchange="mostrarImagen(event,2)">
    </div>

    <!-- PREVIEW -->
    <div class="preview">
      <img id="img0">
      <img id="img1">
      <img id="img2">
    </div>

    <!-- COMENTARIOS -->
    <div class="comentarios">

      <h2>💬 Comentarios</h2>

      <textarea 
      id="comentarioTexto"
      placeholder="Escribe un comentario..."></textarea>

      <button onclick="agregarComentario()">
        Publicar Comentario
      </button>

      <div class="lista-comentarios" id="listaComentarios"></div>

    </div>

    <footer>
      © 2026 - Blog Diseñado con HTML, CSS y JavaScript
    </footer>

  </div>

  <script>

    // MOSTRAR IMAGENES
    function mostrarImagen(event, index){

      const archivo = event.target.files[0];

      if(archivo){

        const lector = new FileReader();

        lector.onload = function(e){

          document.getElementById("img"+index).src =
          e.target.result;

        }

        lector.readAsDataURL(archivo);
      }
    }

    // AGREGAR COMENTARIOS
    function agregarComentario(){

      const texto =
      document.getElementById("comentarioTexto").value;

      if(texto.trim() !== ""){

        const comentario =
        document.createElement("div");

        comentario.classList.add("comentario");

        comentario.innerHTML =
        "👤 Usuario:<br><br>" + texto;

        document.getElementById("listaComentarios")
        .appendChild(comentario);

        document.getElementById("comentarioTexto").value = "";
      }
    }

  </script>

</body>
</html>
